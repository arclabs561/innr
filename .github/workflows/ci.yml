name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -Dwarnings

# SIMD Testing Strategy (grounded in Cryspen's approach):
# 1. Native hardware tests (x86 + ARM) for real SIMD execution
# 2. Cross-compilation checks for target coverage
# 3. Differential testing: SIMD vs scalar reference implementations
# 4. Miri for undefined behavior detection (nightly)
# See: https://cryspen.com/post/specify-rust-simd/

jobs:
  # Primary test suite on x86.
  #
  # Note: GitHub-hosted runners typically have AVX2, but AVX-512 availability is NOT guaranteed.
  # We therefore (a) run normal tests natively, and (b) add a compile-only AVX-512 check to
  # ensure the AVX-512 codepaths still build.
  test-x86:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt --check

      - name: Clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Clippy (aarch64 target)
        # Cross-target lint: catches NEON-gated dead code and unused imports
        # that x86 clippy never compiles.
        run: |
          rustup target add aarch64-unknown-linux-gnu
          cargo clippy --all-targets --all-features --target aarch64-unknown-linux-gnu -- -D warnings

      - name: Build
        run: cargo build --all-features

      - name: Test
        run: cargo test --all-features

      - name: Benchmarks compile
        run: cargo build --benches --all-features

      # Verify SIMD produces correct results vs scalar
      - name: SIMD differential tests
        run: cargo test simd_correctness --all-features

      # Numerical edge cases (denormals, boundaries, cancellation)
      - name: Numerical edge cases
        run: cargo test --test numerical_edge_cases --all-features

      - name: Semver check
        if: github.event_name == 'pull_request'
        run: |
          cargo install cargo-semver-checks --locked || true
          cargo semver-checks

  # AVX-512 EXECUTION under Intel SDE.
  #
  # GitHub-hosted runners do not have AVX-512 and QEMU cannot emulate x86
  # features on x86_64 hosts, so SDE is the only way to actually run these
  # kernels in CI. The runner env var makes every test binary execute under
  # emulation, so the whole differential suite exercises the AVX-512 paths.
  # -icl (Ice Lake) covers avx512f + avx512bw + avx512vpopcntdq, everything
  # the kernels use. setup-sde is SHA-pinned: Intel retires download URLs,
  # and the action hosts the tarballs itself.
  test-avx512-sde:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu
      - uses: Swatinem/rust-cache@v2
      - uses: petarpetrovt/setup-sde@31aa4a8e85e109bef00f1d838613fcc6ec421271 # v5.0
        with:
          sdeVersion: 10.8.0
      - name: Route test execution through SDE (Ice Lake)
        run: echo CARGO_TARGET_X86_64_UNKNOWN_LINUX_GNU_RUNNER="$SDE_PATH/sde64 -icl --" >> "$GITHUB_ENV"
      - name: Test under AVX-512 emulation
        run: cargo test --all-features --target x86_64-unknown-linux-gnu
        env:
          PROPTEST_CASES: 32 # emulation is ~10x slower; default cases would crawl

  # Compile-only AVX-512 row with the full feature set the kernels use
  # (catches bitrot fast on cache hits; the SDE job above is the executor).
  compile-avx512:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu
      - uses: Swatinem/rust-cache@v2
      - name: Compile tests (AVX-512)
        run: cargo test --target x86_64-unknown-linux-gnu --all-features --no-run
        env:
          CARGO_TARGET_X86_64_UNKNOWN_LINUX_GNU_RUSTFLAGS: "-Dwarnings -C target-feature=+avx512f,+avx512bw,+avx512vpopcntdq"

  # ARM native testing (M1/M2 NEON)
  test-arm:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Build (ARM native)
        run: cargo build --all-features

      - name: Test (ARM native)
        run: cargo test --all-features

      - name: SIMD correctness (NEON)
        run: cargo test simd_correctness --all-features

  # Cross-compilation check (build only, no execution)
  cross-compile:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        target:
          - x86_64-unknown-linux-gnu
          - aarch64-unknown-linux-gnu
          - armv7-unknown-linux-gnueabihf
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2

      - name: Check ${{ matrix.target }}
        run: cargo check --target ${{ matrix.target }} --all-features

  # QEMU-based ARM testing (actual execution via emulation)
  # Uses cross-rs for seamless QEMU integration
  test-qemu-arm:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable

      - name: Install cross-rs
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Test via QEMU (aarch64)
        run: cross test --target aarch64-unknown-linux-gnu --all-features
        continue-on-error: true  # QEMU can be flaky

  # Miri for undefined behavior detection
  # Catches: aliasing violations, uninitialized memory, out-of-bounds
  miri:
    runs-on: ubuntu-latest
    # The last three runs died at GitHub's 6h job ceiling (conclusion:
    # cancelled, no failure signal). Proptest's default 256 cases under
    # miri's ~100x slowdown is what ate the time; 16 cases keeps the UB
    # check while finishing in minutes, and the explicit timeout turns
    # any regression into a visible failure instead of a silent cancel.
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@nightly
        with:
          components: miri
      - uses: Swatinem/rust-cache@v2

      - name: Miri setup
        run: cargo miri setup

      - name: Miri tests (safe subset)
        env:
          MIRIFLAGS: "-Zmiri-disable-isolation"
          PROPTEST_CASES: 16
        run: |
          # Miri can't run SIMD intrinsics, so test scalar paths
          # -Zmiri-disable-isolation allows proptest to access getcwd/filesystem
          # --features sparse: sparse_ext is the one module with heavy
          # unsafe inside safe fns; default features leave it uncompiled.
          cargo miri test --lib --features sparse -- --skip simd

  # Property tests with extended iterations
  property-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Run property tests (extended)
        run: cargo test property_ --all-features
        env:
          PROPTEST_CASES: 2000

  # MSRV check (build only, no tests -- dev-dependencies may require newer Rust)
  msrv:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@1.89
      - uses: Swatinem/rust-cache@v2

      - name: Check MSRV
        run: |
          # MSRV matches Cargo.toml `rust-version = "1.89"`. The 1.89 floor
          # is set by AVX-512 intrinsics on x86_64; bumping in lockstep with
          # Cargo.toml keeps the gate honest.
          rm -f Cargo.lock
          rustup target add aarch64-unknown-linux-gnu
          cargo check --target aarch64-unknown-linux-gnu

  # Dependency linting (licenses, advisories, bans, sources)
  deny:
    name: cargo-deny
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: EmbarkStudios/cargo-deny-action@v2
