name: mutation

# Weekly, not per-PR: cargo-mutants is slow (each mutant rebuilds + reruns the
# suite). This measures whether the differential/property oracles would
# actually catch an introduced bug, and opens an issue on regression.
permissions:
  contents: read

on:
  workflow_dispatch:

jobs:
  mutants:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # v1
        with:
          toolchain: "stable"
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - name: Install cargo-mutants
        uses: taiki-e/install-action@43aecc8d72668fbcfe75c31400bc4f890f1c5853 # v2.83.2
        with:
          tool: cargo-mutants
      - name: Mutation test core modules
        # Scope to the contract-bearing kernels; a full-crate run exceeds the
        # weekly budget. --in-place is fine on a throwaway runner.
        run: |
          cargo mutants --in-place --no-shuffle \
            -f src/dense.rs -f src/dense_f64.rs -f src/slot.rs \
            -f src/distance.rs -f src/maxsim.rs \
            -- --all-features
      - name: Upload outcomes
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: mutants-out
          path: mutants.out/
